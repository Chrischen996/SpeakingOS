services:
  postgres:
    image: postgres:16-alpine
    container_name: speakingos-postgres
    environment:
      POSTGRES_USER: speakingos
      POSTGRES_PASSWORD: speakingos
      POSTGRES_DB: speakingos
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speakingos -d speakingos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: speakingos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: speakingos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: speakingos
      MINIO_ROOT_PASSWORD: speakingos-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 speakingos speakingos-secret;
      mc mb --ignore-existing local/speakingos-audio;
      mc anonymous set none local/speakingos-audio;
      exit 0;
      "
